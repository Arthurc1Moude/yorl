<svg width="128" height="128" viewBox="0 0 128 128" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="neonGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ff00ff;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#00ffff;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#00ff00;stop-opacity:1" />
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="4" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  
  <!-- Background -->
  <rect width="128" height="128" rx="24" fill="#0d1117"/>
  
  <!-- Y Letter with neon effect -->
  <path d="M 35 30 L 50 55 L 50 85 L 60 85 L 60 55 L 75 30 L 65 30 L 55 48 L 45 30 Z" 
        fill="url(#neonGradient)" 
        filter="url(#glow)"
        stroke="url(#neonGradient)" 
        stroke-width="2"/>
  
  <!-- Decorative brackets -->
  <path d="M 25 45 L 20 50 L 25 55" 
        fill="none" 
        stroke="#00ffff" 
        stroke-width="3" 
        stroke-linecap="round"
        filter="url(#glow)"/>
  <path d="M 103 45 L 108 50 L 103 55" 
        fill="none" 
        stroke="#ff00ff" 
        stroke-width="3" 
        stroke-linecap="round"
        filter="url(#glow)"/>
  
  <!-- Bottom accent line -->
  <line x1="35" y1="100" x2="93" y2="100" 
        stroke="url(#neonGradient)" 
        stroke-width="3" 
        stroke-linecap="round"
        filter="url(#glow)"/>
</svg>
