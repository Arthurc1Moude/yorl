app-id: com.yorl.installer
runtime: org.gnome.Platform
runtime-version: '45'
sdk: org.gnome.Sdk
command: install-yolex-gui

finish-args:
  - --share=network
  - --share=ipc
  - --socket=fallback-x11
  - --socket=wayland
  - --device=dri
  - --filesystem=home

modules:
  - name: yorl-installer
    buildsystem: simple
    build-commands:
      - install -D install-yolex-gui /app/bin/install-yolex-gui
    sources:
      - type: file
        path: install-yolex-gui
